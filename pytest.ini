[pytest]
# Descubrimiento de tests: la suite nueva vive en `tests/`; se conserva la
# suite de integración de la API en `api/tests/`.
testpaths = tests api/tests
pythonpath = .

# `python -m pytest` ya añade el cwd a sys.path, pero fijar pythonpath=.
# garantiza que `import src` / `import api` / `import ui` funcionen siempre.

markers =
    slow: tests que cargan el modelo bundled o son lentos por otros motivos.
    integration: tests que ejercitan varios componentes a la vez.

filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
